version: "3.9"

services:
  aicos:
    build: .
    ports:
      - "${AICOS_DASHBOARD_PORT:-8080}:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AICOS_DASHBOARD_USER=${AICOS_DASHBOARD_USER:-}
      - AICOS_DASHBOARD_PASS=${AICOS_DASHBOARD_PASS:-}
      - AICOS_COMPANY_CONFIG=config/company.yaml
    volumes:
      - aicos-data:/app/data
      - ./config:/app/config:ro
    restart: unless-stopped

volumes:
  aicos-data:
