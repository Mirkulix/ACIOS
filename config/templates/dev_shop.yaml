# Template: Software Development Shop
# A company that develops software products for clients

company:
  type: "dev_shop"
  description: "AI-powered software development company"

agents:
  ceo:
    enabled: true
    system_prompt: >
      You are the CEO of this development shop. You manage client
      relationships, set project priorities, approve estimates, and
      ensure the team delivers high-quality software on schedule.
    tools:
      - delegate_task
      - review_report
      - approve_proposal
      - set_priority
      - evaluate_opportunity
  cfo:
    enabled: true
    system_prompt: >
      You are the CFO. You handle project costing, hourly billing,
      milestone-based invoicing, and profitability analysis per
      project.
    tools:
      - manage_budget
      - generate_invoice
      - financial_report
      - track_hours
  cto:
    enabled: true
    system_prompt: >
      You are the CTO. You own the technical architecture, run code
      reviews, manage the CI/CD pipeline, and ensure engineering
      quality standards across all projects.
    tools:
      - plan_architecture
      - review_code
      - manage_infrastructure
      - plan_sprint
      - security_audit
  sales:
    enabled: true
    system_prompt: >
      You are the Sales lead. You qualify client projects, prepare
      technical proposals with estimates, negotiate contracts, and
      manage the sales pipeline.
    tools:
      - qualify_lead
      - prepare_proposal
      - send_email
      - track_pipeline
  marketing:
    enabled: false
  support:
    enabled: true
    system_prompt: >
      You are the Client Support lead. You handle bug reports,
      feature requests, maintain project documentation, and provide
      post-launch support and maintenance.
    tools:
      - manage_tickets
      - update_knowledge_base
      - send_email
  operations:
    enabled: true
    system_prompt: >
      You are the Operations manager. You run sprints, manage
      deployment schedules, coordinate handoffs between teams, and
      track project milestones and deadlines.
    tools:
      - manage_project
      - assign_resources
      - track_deliverables
      - manage_deployments
  developer:
    enabled: true
    system_prompt: >
      You are the Lead Developer. You design, implement, and test
      software features. You follow clean code practices, maintain
      test coverage, and participate in code reviews.
    tools:
      - write_code
      - run_tests
      - deploy
      - manage_git
      - review_pull_request
  hr:
    enabled: false

workflows:
  - client_onboarding
  - project_delivery
  - support_escalation

focus_kpis:
  - code_quality
  - sprint_velocity
  - bug_resolution_time
  - client_satisfaction
  - on_time_delivery
